<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique - TravelBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/index.html">🚌 TravelBook</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reservation.html">Réservation</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/history.html">Historique</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">📋 Historique de vos réservations</h2>

        <div id="bookingsList">
            <!-- Chargé dynamiquement -->
        </div>

        <div id="noBookings" class="text-center py-5" style="display: none;">
            <i class="fas fa-ticket-alt" style="font-size: 64px; color: #6c757d;"></i>
            <h4 class="mt-3 text-muted">Aucune réservation</h4>
            <p>Vous n'avez pas encore effectué de réservation.</p>
            <a href="/reservation.html" class="btn btn-primary">Réserver maintenant</a>
        </div>
    </div>

    <!-- Modal pour laisser un avis -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">⭐ Laisser un avis</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="reviewForm">
                        <input type="hidden" id="reviewTripId">
                        <input type="hidden" id="reviewBookingId">

                        <div class="text-center mb-3">
                            <p class="mb-2">Votre note :</p>
                            <div id="starRating">
                                <i class="far fa-star fa-3x text-warning" onclick="setRating(1)"
                                    style="cursor:pointer;"></i>
                                <i class="far fa-star fa-3x text-warning" onclick="setRating(2)"
                                    style="cursor:pointer;"></i>
                                <i class="far fa-star fa-3x text-warning" onclick="setRating(3)"
                                    style="cursor:pointer;"></i>
                                <i class="far fa-star fa-3x text-warning" onclick="setRating(4)"
                                    style="cursor:pointer;"></i>
                                <i class="far fa-star fa-3x text-warning" onclick="setRating(5)"
                                    style="cursor:pointer;"></i>
                            </div>
                            <input type="hidden" id="reviewRating" value="0">
                            <small id="ratingText" class="text-muted">Cliquez sur une étoile</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Votre commentaire</label>
                            <textarea class="form-control" id="reviewComment" rows="3"
                                placeholder="Partagez votre expérience..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-warning w-100">
                            <i class="fas fa-star"></i> Publier l'avis
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/history.js"></script>
</body>

</html>
