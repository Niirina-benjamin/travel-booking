<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation - TravelBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .confirmation-card {
            border: 2px solid #28a745;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .check-icon {
            font-size: 80px;
            color: #28a745;
        }
        .detail-row {
            border-bottom: 1px solid #dee2e6;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚌 TravelBook</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card confirmation-card">
                    <div class="card-body text-center p-5">
                        <div class="check-icon mb-3">✓</div>
                        <h2 class="text-success mb-4">Réservation Confirmée !</h2>
                        
                        <div class="alert alert-success">
                            <strong>Numéro de réservation:</strong> 
                            <span id="bookingRef" class="h4"></span>
                        </div>

                        <div class="text-start mt-4">
                            <h5>Détails du voyage</h5>
                            <div class="detail-row">
                                <strong>Trajet:</strong> 
                                <span id="route"></span>
                            </div>
                            <div class="detail-row">
                                <strong>Date de départ:</strong> 
                                <span id="departureDate"></span>
                            </div>
                            <div class="detail-row">
                                <strong>Sièges:</strong> 
                                <span id="seats"></span>
                            </div>
                            <div class="detail-row">
                                <strong>Prix total:</strong> 
                                <span id="totalPrice" class="h5 text-primary"></span>
                            </div>
                        </div>

                        <div class="mt-4">
                            <a href="index.html" class="btn btn-primary btn-lg me-3">
                                Retour à l'accueil
                            </a>
                            <a href="history.html" class="btn btn-outline-primary btn-lg">
                                Voir mes réservations
                            </a>
                        </div>

                        <div class="mt-3">
                            <button onclick="window.print()" class="btn btn-secondary">
                                🖨️ Imprimer la confirmation
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/confirmation.js"></script>
</body>
</html>
