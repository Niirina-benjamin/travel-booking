<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - TravelBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">🚌 TravelBook</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link active" href="reservation.html">Réservation</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html">Historique</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Réservation de voyage</h2>
        
        <!-- Étapes de réservation -->
        <div class="progress mb-4" style="height: 30px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 33%">
                Étape 1: Détails du voyage
            </div>
        </div>

        <form id="reservationForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="depart" class="form-label">Lieu de départ</label>
                    <select class="form-select" id="depart" required>
                        <option value="">Choisir...</option>
                        <option value="Paris">Paris</option>
                        <option value="Lyon">Lyon</option>
                        <option value="Marseille">Marseille</option>
                        <option value="Nice">Nice</option>
                        <option value="Bordeaux">Bordeaux</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="destination" class="form-label">Destination</label>
                    <select class="form-select" id="destination" required>
                        <option value="">Choisir...</option>
                        <option value="Paris">Paris</option>
                        <option value="Lyon">Lyon</option>
                        <option value="Marseille">Marseille</option>
                        <option value="Nice">Nice</option>
                        <option value="Bordeaux">Bordeaux</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="date" class="form-label">Date de départ</label>
                    <input type="date" class="form-control" id="date" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="passagers" class="form-label">Nombre de passagers</label>
                    <input type="number" class="form-control" id="passagers" min="1" max="10" value="1" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="classe" class="form-label">Classe</label>
                    <select class="form-select" id="classe">
                        <option value="economique">Économique</option>
                        <option value="confort">Confort</option>
                        <option value="premium">Premium</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="preferences" class="form-label">Préférences (optionnel)</label>
                <textarea class="form-control" id="preferences" rows="3" placeholder="Ex: Sièges côte fenêtre, proche de l'avant..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">Rechercher les trajets disponibles</button>
        </form>

        <!-- Résultats de recherche -->
        <div id="searchResults" class="mt-5" style="display: none;">
            <h3>Trajets disponibles</h3>
            <div id="availableTrips" class="row">
                <!-- Les trajets seront chargés ici -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/reservation.js"></script>
</body>
</html>
