<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - TravelBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">🚌 TravelBook</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Accueil</a>
                <a class="nav-link" href="/reservation.html">Réservation</a>
                <a class="nav-link" href="/history.html">Historique</a>
                <a class="nav-link active" href="/profile.html">Profil</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-user-circle fa-5x text-primary"></i>
                        <h3 id="profileName" class="mt-3">---</h3>
                        <p id="profileEmail" class="text-muted">---</p>
                        <p id="profileMemberSince" class="small text-muted">---</p>
                        <hr>
                        <div class="row">
                            <div class="col-6">
                                <h4 id="totalBookings">0</h4>
                                <small>Réservations</small>
                            </div>
                            <div class="col-6">
                                <h4 id="totalReviews">0</h4>
                                <small>Avis</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header"><h5><i class="fas fa-edit"></i> Modifier mon profil</h5></div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="mb-3">
                                <label>Nom</label>
                                <input type="text" class="form-control" id="editNom" required>
                            </div>
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" class="form-control" id="editEmail" required>
                            </div>
                            <div class="mb-3">
                                <label>Téléphone</label>
                                <input type="tel" class="form-control" id="editTelephone">
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Enregistrer</button>
                        </form>
                    </div>
                </div>
                
                <div class="card mb-4">
                    <div class="card-header"><h5><i class="fas fa-lock"></i> Changer le mot de passe</h5></div>
                    <div class="card-body">
                        <form id="passwordForm">
                            <div class="mb-3">
                                <label>Mot de passe actuel</label>
                                <input type="password" class="form-control" id="currentPassword" required>
                            </div>
                            <div class="mb-3">
                                <label>Nouveau mot de passe</label>
                                <input type="password" class="form-control" id="newPassword" required>
                            </div>
                            <div class="mb-3">
                                <label>Confirmer</label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn btn-warning"><i class="fas fa-key"></i> Changer</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin + '/api';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/login.html';
        }

        async function loadProfile() {
            try {
                const response = await fetch(`${API_URL}/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const profile = await response.json();
                
                document.getElementById('profileName').textContent = profile.nom;
                document.getElementById('profileEmail').textContent = profile.email;
                document.getElementById('profileMemberSince').textContent = 
                    'Membre depuis ' + new Date(profile.created_at).toLocaleDateString('fr-FR');
                document.getElementById('totalBookings').textContent = profile.stats?.totalBookings || 0;
                document.getElementById('totalReviews').textContent = profile.stats?.totalReviews || 0;
                
                document.getElementById('editNom').value = profile.nom;
                document.getElementById('editEmail').value = profile.email;
                document.getElementById('editTelephone').value = profile.telephone || '';
            } catch (error) {
                console.error('Erreur profil:', error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        nom: document.getElementById('editNom').value,
                        email: document.getElementById('editEmail').value,
                        telephone: document.getElementById('editTelephone').value
                    })
                });
                if (response.ok) {
                    alert('✅ Profil mis à jour !');
                    loadProfile();
                }
            } catch (error) { console.error('Erreur:', error); }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            
            if (newPwd !== confirmPwd) {
                alert('Les mots de passe ne correspondent pas');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/profile/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        currentPassword: document.getElementById('currentPassword').value,
                        newPassword: newPwd
                    })
                });
                const result = await response.json();
                if (response.ok) {
                    alert('✅ Mot de passe changé !');
                    document.getElementById('passwordForm').reset();
                } else {
                    alert(result.message);
                }
            } catch (error) { console.error('Erreur:', error); }
        });

        loadProfile();
    </script>
</body>
</html>
